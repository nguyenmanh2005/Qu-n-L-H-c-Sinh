<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Đăng Ký - Giải Trí Lành Mạnh</title>
    <link rel="icon" href="images.ico">
    <link rel="stylesheet" href="Css/register.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
    <!-- Floating Particles -->
    <div class="particles-container" id="particlesContainer"></div>

    <div class="register-card">
        <!-- Title -->
        <div class="register-title">    
            <h1>Đăng Ký</h1>
            <p>Tham gia cùng chúng tôi ngay hôm nay!</p>
        </div>

        <!-- Form -->
        <form id="registerForm" method="post">
            <div class="form-group">
                <label for="fullname">Họ Tên</label>
                <div class="input-wrapper">
                    <i class="fas fa-user input-icon"></i>
                    <input type="text" id="fullname" name="fullname" placeholder="Nhập họ tên của bạn" required autocomplete="name">
                    <div class="typing-indicator" id="fullnameTyping">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="validation-message" id="fullnameValidation"></div>
            </div>

            <div class="form-group">
                <label for="email">Email</label>
                <div class="input-wrapper">
                    <i class="fas fa-envelope input-icon"></i>
                    <input type="email" id="email" name="email" placeholder="Nhập email của bạn" required autocomplete="email">
                    <div class="typing-indicator" id="emailTyping">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="validation-message" id="emailValidation"></div>
            </div>
            
            <div class="form-group">
                <label for="password">Mật Khẩu</label>
                <div class="input-wrapper">
                    <i class="fas fa-lock input-icon"></i>
                    <input type="password" id="password" name="password" placeholder="Nhập mật khẩu (tối thiểu 6 ký tự)" required autocomplete="new-password">
                    <button type="button" class="password-toggle" id="togglePassword">
                        <i class="fas fa-eye-slash"></i>
                    </button>
                    <div class="typing-indicator" id="passwordTyping">
                        <span></span><span></span><span></span>
                    </div>
                </div>
                <div class="password-strength" id="passwordStrength">
                    <div class="password-strength-bar" id="passwordStrengthBar">
                        <span class="password-strength-emoji"></span>
                    </div>
                </div>
                <div class="validation-message" id="passwordValidation"></div>
                <div class="password-tips" id="passwordTips">
                    <strong>Mẹo tạo mật khẩu mạnh:</strong>
                    <ul>
                        <li>Ít nhất 6 ký tự</li>
                        <li>Kết hợp chữ hoa và chữ thường</li>
                        <li>Thêm số và ký tự đặc biệt</li>
                        <li>Tránh thông tin cá nhân</li>
                    </ul>
                </div>
            </div>

            <input type="hidden" name="action" value="register">
            <button type="submit" class="submit-btn" id="submitBtn">
                <span class="btn-text">Đăng Ký Ngay</span>
                <span class="btn-loader">
                    <i class="fas fa-spinner fa-spin"></i> Đang xử lý...
                </span>
            </button>
        </form>

        <!-- Login Link -->
        <div class="login-link">
            <p>Bạn đã có tài khoản? </p>
            <a href="login.html">
                <i class="fas fa-sign-in-alt"></i>
                Đăng nhập ngay
                <i class="fas fa-arrow-right"></i>
            </a>
        </div>

        <!-- Footer -->
        <footer>
            <!-- Bạn có thể thêm nội dung footer nếu cần -->
        </footer>
    </div>

    <script>
        const form = document.getElementById("registerForm");
        const submitBtn = document.getElementById("submitBtn");
        const btnText = submitBtn.querySelector(".btn-text");
        const btnLoader = submitBtn.querySelector(".btn-loader");

        // Xử lý submit form đăng ký
        form.addEventListener("submit", async function(e) {
            e.preventDefault();

            const fullname = document.getElementById("fullname").value.trim();
            const email = document.getElementById("email").value.trim();
            const password = document.getElementById("password").value;

            // Validate cơ bản
            if (!fullname || !email || !password) {
                Swal.fire("Thiếu thông tin", "Vui lòng nhập đầy đủ thông tin", "warning");
                return;
            }

            if (password.length < 6) {
                Swal.fire("Mật khẩu yếu", "Mật khẩu tối thiểu 6 ký tự", "warning");
                return;
            }

            submitBtn.disabled = true;
            btnText.style.display = "none";
            btnLoader.style.display = "inline-block";

            try {
                const response = await fetch("http://localhost:5187/api/auth/register", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        username: fullname,
                        email: email,
                        password: password
                    })
                });

                const contentType = response.headers.get("content-type");
                let result;

                if (contentType && contentType.includes("application/json")) {
                    result = await response.json();
                } else {
                    result = await response.text();
                }

                if (response.ok) {
                    Swal.fire({
                        icon: "success",
                        title: "Đăng ký thành công",
                        text: "Chuyển sang trang đăng nhập...",
                        timer: 1500,
                        showConfirmButton: false
                    });

                    setTimeout(() => {
                        window.location.href = "login.html";
                    }, 1500);
                } else {
                    if (Array.isArray(result)) {
                        const errors = result.map(e => e.description).join("<br>");
                        Swal.fire("Lỗi đăng ký", errors, "error");
                    } else {
                        Swal.fire("Lỗi đăng ký", result || "Đã có lỗi xảy ra", "error");
                    }
                }
            } catch (error) {
                Swal.fire("Lỗi", "Không kết nối được server: " + error.message, "error");
            } finally {
                submitBtn.disabled = false;
                btnText.style.display = "inline";
                btnLoader.style.display = "none";
            }
        });

        // Toggle hiển thị / ẩn mật khẩu
        const passwordInput = document.getElementById("password");
        const togglePasswordBtn = document.getElementById("togglePassword");

        if (togglePasswordBtn && passwordInput) {
            togglePasswordBtn.addEventListener("click", function () {
                // Chuyển đổi type
                const currentType = passwordInput.getAttribute("type");
                const newType = currentType === "password" ? "text" : "password";
                passwordInput.setAttribute("type", newType);

                // Chuyển đổi icon
                const icon = this.querySelector("i");
                icon.classList.toggle("fa-eye");
                icon.classList.toggle("fa-eye-slash");
            });
        }
    </script>
</body>
</html>
